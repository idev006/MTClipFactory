[caption_selection]
mode = "random_with_seed"
seed_scope = "batch"

# Use \n only when you intentionally want multiple rendered lines.
# If no \n exists, the runtime keeps one rendered line and solves font size against the textbox.

[caption_pools.hook]
main = [
  "กลับมาแจก\nความสดใส\nและพลังบวกได้เต็มที่",
  "เติมพลังใจ\nให้ทุกวันสดใส",
]
sub = [
  "เริ่มต้นวันใหม่ด้วยพลังที่ใช่",
  "ช่วยเสริมอารมณ์บวกและความน่าจดจำ",
]

[caption_pools.benefit]
main = [
  "ดูแลกระดูก\nและฟันในทุกวัน",
]
sub = [
  "เหมาะกับการดูแลต่อเนื่องในชีวิตประจำวัน",
]

[caption_pools.problem]
main = [
  "Need a stronger problem statement",
]
sub = [
  "Replace this placeholder with the product's actual pain point or concern.",
]

[caption_pools.proof]
main = [
  "อีกหนึ่งตัวช่วย\nที่หลายคนวางใจ",
]
sub = [
  "ใช้เป็นข้อความ supporting ในช่วง proof ได้",
]

[caption_pools.cta]
main = [
  "พร้อมดูแลตัวเอง\nเริ่มได้วันนี้",
]
sub = [
  "เลือกข้อความ CTA ให้สอดคล้องกับ platform และสินค้า",
]

[caption_properties.main]
style_preset = "sale_blast"
position = "center"
alignment = "center"
vertical_alignment = "middle"
textbox_alignment = "center"
textbox_mode = "per_line"
font_family = "THSarabun"
font_fallbacks = ["TH Chakra Petch", "Tahoma", "Arial Unicode MS"]
font_size = 72
min_font_size = 48
font_weight = "bold"
text_color = "#FFFFFF"
stroke_color = "#000000"
stroke_width = 3
background_color = "#000000"
background_opacity = 0.15
# Optional border override fields when you want to override the preset card edge.
# box_border_color = "#FFD447"
# box_border_opacity = 0.96
# box_border_width = 4
padding = 20
max_lines = 3
max_chars_per_line = 18
textbox_width_ratio = 0.78
textbox_height_ratio = 0.18
overflow_policy = "wrap_then_scale_then_review"
enter_animation = "pop_in"
review_required_if_overflow = true

[caption_properties.sub]
style_preset = "sale_blast"
position = "bottom"
alignment = "center"
vertical_alignment = "middle"
textbox_alignment = "center"
textbox_mode = "grouped"
font_family = "THSarabun"
font_fallbacks = ["TH Chakra Petch", "Tahoma", "Arial Unicode MS"]
font_size = 40
min_font_size = 30
font_weight = "medium"
text_color = "#FFFFFF"
stroke_color = "#000000"
stroke_width = 2
background_color = "#000000"
background_opacity = 0.30
# Optional border override fields when you want to override the preset card edge.
# box_border_color = "#F8FAFC"
# box_border_opacity = 0.94
# box_border_width = 3
padding = 16
max_lines = 3
max_chars_per_line = 28
textbox_width_ratio = 0.82
textbox_height_ratio = 0.14
overflow_policy = "wrap_then_truncate_or_review"
enter_animation = "fade_in"
review_required_if_overflow = true
