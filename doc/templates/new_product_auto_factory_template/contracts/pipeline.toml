[request]
requested_output_count = 3
target_platform = "tiktok"
target_ratio = "9:16"
uniqueness_scope = "batch"
duration_mode = "voice_with_bounds"
fixed_duration_sec = 18.0
min_duration_sec = 12.0
max_duration_sec = 30.0

[selection_tags]
foreground = []
background = []
music = []
voice = []

[fill_policy.voiceover]
loop_enabled = false
shortfall_mode = "silence_tail"

[fill_policy.background_music]
loop_enabled = true
shortfall_mode = "loop_to_timeline"

[fill_policy.background_video]
loop_enabled = true
shortfall_mode = "loop_to_segment"

[fill_policy.foreground_video]
loop_enabled = false
shortfall_mode = "freeze_last_frame"
